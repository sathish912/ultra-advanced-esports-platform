version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ultra_admin
      POSTGRES_PASSWORD: ultra_password
      POSTGRES_DB: ultra_esports
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ultra_admin:ultra_password@db:5432/ultra_esports
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super_secret_production_key_change_me
    depends_on:
      - db
      - redis
    restart: unless-stopped
    volumes:
      - ./backend/static:/app/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
