apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: ultra-esports
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: username/ultra-esports-backend:latest
        command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info"]
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:mysecretpassword@postgres:5432/ultra_esports"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
